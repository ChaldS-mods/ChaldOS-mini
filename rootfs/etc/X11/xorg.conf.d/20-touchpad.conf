# Touchpad configuration
Section "InputClass"
    Identifier      "Touchpad"
    Driver          "libinput"
    MatchIsTouchpad "on"
    Option          "Tapping" "on"
    Option          "TappingButtonMap" "lrm"
    Option          "NaturalScrolling" "true"
    Option          "ScrollMethod" "twofinger"
EndSection

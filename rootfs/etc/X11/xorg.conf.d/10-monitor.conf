# ChaldOS multi-monitor configuration
# /etc/X11/xorg.conf.d/10-monitor.conf
# Auto-detects and configures multiple displays

Section "Monitor"
    Identifier  "Monitor0"
    Option      "Primary" "true"
EndSection

Section "Monitor"
    Identifier  "Monitor1"
    Option      "RightOf" "Monitor0"
EndSection

Section "Monitor"
    Identifier  "Monitor2"
    Option      "RightOf" "Monitor1"
EndSection

Section "Device"
    Identifier  "Card0"
    Driver      "modesetting"
    Option      "kmsdev" "/dev/dri/card0"
    Option      "SWCursor" "false"
    BusID       "PCI:0:1:0"
EndSection

Section "Screen"
    Identifier  "Screen0"
    Device      "Card0"
    Monitor     "Monitor0"
    DefaultDepth 24
    SubSection  "Display"
        Depth   24
        Modes   "1920x1080" "1680x1050" "1366x768" "1280x720"
    EndSubSection
EndSection

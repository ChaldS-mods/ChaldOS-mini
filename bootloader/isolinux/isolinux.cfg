# ChaldOS ISOLINUX Configuration
# /boot/isolinux/isolinux.cfg
# Used for CD/USB boot

default chaldos
prompt 1
timeout 100

display boot.msg

# ChaldOS default boot
label chaldos
    menu label ^ChaldOS v1.0.0 "Pixel Dawn"
    kernel /boot/vmlinuz
    append initrd=/boot/initramfs.cpio.gz root=/dev/sda1 rootfstype=ext4 rw quiet

# Safe mode (no KMS)
label chaldos-safe
    menu label ChaldOS — ^Safe Mode
    kernel /boot/vmlinuz
    append initrd=/boot/initramfs.cpio.gz root=/dev/sda1 rw nomodeset

# Debug mode
label chaldos-debug
    menu label ChaldOS — ^Debug
    kernel /boot/vmlinuz
    append initrd=/boot/initramfs.cpio.gz root=/dev/sda1 rw debug loglevel=7

# Live mode
label chaldos-live
    menu label ChaldOS — ^Live (RAM)
    kernel /boot/vmlinuz
    append initrd=/boot/initramfs.cpio.gz root=/dev/sda1 rootfstype=squashfs rw quiet

# Hardware test
label memtest
    menu label ^Memory Test
    kernel /boot/memtest86.bin

# Local boot
label local
    menu label Boot from ^Local Drive
    localboot 0x80

# Help
label help
    menu label ^Help
    help help.txt

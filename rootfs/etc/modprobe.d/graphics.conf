# ChaldOS Graphics Module Configuration
# /etc/modprobe.d/graphics.conf

# Enable Kernel Mode Setting for Intel
options i915 modeset=1 enable_fbc=1 enable_psr=0

# Enable Kernel Mode Setting for AMD
options amdgpu modeset=1 dc=1

# Enable Kernel Mode Setting for NVIDIA (open driver)
options nouveau modeset=1

# SimpleDRM fallback (for virtual machines and simple framebuffers)
options simpledrm modeset=1

# Framebuffer settings
# Format: width_height_depth
# options fbcon=font:TER16x32

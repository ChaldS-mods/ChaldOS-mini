# ChaldOS Build Configuration
# ============================
# Edit this file to customize your ChaldOS build.

# --- Version ---
CHALDOS_VERSION := 1.0.0
CHALDOS_CODENAME := "Pixel Dawn"

# --- Kernel ---
LINUX_VERSION := 6.6.30
LINUX_MIRROR := https://cdn.kernel.org/pub/linux/kernel/v6.x
LINUX_CONFIG := $(CONFIG)/kernel.config

# --- BusyBox ---
BUSYBOX_VERSION := 1.36.1
BUSYBOX_MIRROR := https://busybox.net/downloads
BUSYBOX_CONFIG := $(CONFIG)/busybox.config

# --- Build Options ---
BUILD_THREADS := $(shell nproc 2>/dev/null || echo 4)
BUILD_ARCH := x86_64
CROSS_COMPILE :=

# --- ISO Options ---
ISO_NAME := chaldos-$(CHALDOS_VERSION)-$(BUILD_ARCH).iso
ISO_LABEL := CHALDOS_$(CHALDOS_VERSION)
ISO_BOOTLOADER := isolinux

# --- Wayland / Weston Stack ---
# Versions for the optional graphical desktop
WAYLAND_VERSION := 1.22.0
WPROTO_VERSION := 1.36
PIXMAN_VERSION := 0.42.2
LIBDRM_VERSION := 2.4.120
XKBCOMMON_VERSION := 1.6.0
EUDEV_VERSION := 3.2.12
LIBINPUT_VERSION := 1.25.0
WESTON_VERSION := 12.0.1
# Desktop mode (console or weston)
DESKTOP_MODE := console

# --- Rootfs Options ---
ROOTFS_SIZE_MB := 256
ROOTFS_TYPE := squashfs

# --- Display / GPU ---
# Options: fbdev, vesafb, simpledrm, modesetting
DISPLAY_DRIVER := simpledrm
# Enable modesetting for multi-monitor support
ENABLE_KMS := y
# Default framebuffer resolution
FB_WIDTH := 1920
FB_HEIGHT := 1080
FB_DEPTH := 32

# --- Network ---
ENABLE_NETWORK := y
ENABLE_WIFI := y
ENABLE_DHCP := y
NETWORK_INTERFACE := eth0

# --- Packages to include in rootfs ---
CHALDOS_PACKAGES := \
	bash \
	coreutils \
	dhcpcd \
	wpa_supplicant \
	wget \
	curl \
	openssl \
	nano \
	procps \
	util-linux \
	sysklogd \
	dropbear

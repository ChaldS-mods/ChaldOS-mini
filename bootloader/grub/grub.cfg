# ChaldOS GRUB Configuration
# /boot/grub/grub.cfg

set default=0
set timeout=5
set gfxmode=auto
set gfxpayload=keep

# ChaldOS theme
set theme=${prefix}/grub/themes/chaldos/theme.txt

# Load video drivers
insmod all_video
insmod gfxterm
insmod vbe
insmod vga

# Set terminal
terminal_output gfxterm

# Color scheme
set menu_color_normal=cyan/black
set menu_color_highlight=black/cyan

# CHALDOS boot entry
menuentry "ChaldOS v1.0.0 'Pixel Dawn'" --class chaldos --class os {
    echo "Loading ChaldOS..."
    linux /boot/vmlinuz root=/dev/sda1 rootfstype=ext4 rw quiet splash
    echo "Loading initramfs..."
    initrd /boot/initramfs.cpio.gz
}

menuentry "ChaldOS — Safe Mode" --class chaldos --class os {
    linux /boot/vmlinuz root=/dev/sda1 rootfstype=ext4 rw nomodeset
    initrd /boot/initramfs.cpio.gz
}

menuentry "ChaldOS — Debug Mode" --class chaldos --class os {
    linux /boot/vmlinuz root=/dev/sda1 rootfstype=ext4 rw debug loglevel=7
    initrd /boot/initramfs.cpio.gz
}

menuentry "ChaldOS — Live (RAM)" --class chaldos --class os {
    linux /boot/vmlinuz root=/dev/sda1 rootfstype=squashfs rw quiet
    initrd /boot/initramfs.cpio.gz
}

# Other OS entries (populated by os-prober)
if [ -f /boot/grub/other-os.cfg ]; then
    source /boot/grub/other-os.cfg
fi

# System tools
menuentry "System Memory Test (memtest86)" --class memtest {
    linux /boot/memtest86.bin
}

menuentry "Reboot" --class reboot {
    reboot
}

menuentry "Shutdown" --class shutdown {
    halt
}
